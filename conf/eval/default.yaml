defaults:
  - base_eval

# Held-out simulated test set (generated by `simulate` with a different seed / output name).
test_dataset_name: test_data_${data.n_simulations}.npz
num_samples: 1000
batch_size: 256
diagnostics:
  - metrics            # RMSE + calibration error (bayesflow.diagnostics.metrics)
  - recovery           # truth vs estimate scatter
  - calibration_ecdf   # simulation-based calibration (rank ECDF)
  - coverage           # credible-interval coverage vs. nominal
  - z_score_contraction

# Summary-space misspecification test (evaluate_real, composition=global): point at an
# `evaluate composition=global` run dir that saved summaries.npz (or a direct .npz path).
# Empty = skip. See pipeline/misspecification.py.
misspecification_reference: ""
misspecification_num_null: 200
