# Stellar streams in a parametrized Milky Way potential, simulated with AGAMA (CPU + joblib).
# Priors reproduce the reference agama training set (data/streams/data_agama/.hydra/config.yaml).
# Global = potential parameters shared by all streams; local = per-stream phase-space coordinates;
# `identity` entries are fixed constants (fed to the forward model, not inferred).
defaults:
  - base_simulator

name: stream_agama
params:
  n_particles: 1000
  n_workers: 8

  target_streams:
    Pal5: 0 # the j index
    NGC3201: 1
    M68: 2

  priors_global:
    rho_TwoPowerTriaxial_halo:
      type: uniform
      prior_parameters: [1.0e6, 1.5e8]
    gamma_TwoPowerTriaxial_halo:
      type: uniform
      prior_parameters: [-2.0, 2.0]
    a_TwoPowerTriaxial_halo:
      type: uniform
      prior_parameters: [1.0, 30.0]
    beta_TwoPowerTriaxial_halo:
      type: identity
      prior_parameters: [3.0]
    q_TwoPowerTriaxial_halo:
      type: uniform
      prior_parameters: [0.5, 1.5]
    r_Disk:
      type: normal
      prior_parameters: [2.6, 0.5]
    z_Disk:
      type: normal
      prior_parameters: [0.3, 0.05]
    Sigma_Disk:
      type: uniform
      prior_parameters: [1.0e7, 1.5e9]

  priors_local:
    Pal5:
      m_progenitor:
        type: identity
        prior_parameters: [4.3e3]
      a_progenitor:
        type: identity
        prior_parameters: [8.43]
      t_end:
        type: identity
        prior_parameters: [4.0]
      ra:
        type: identity
        prior_parameters: [229.022]
      dec:
        type: identity
        prior_parameters: [-0.112]
      vr:
        type: normal
        prior_parameters: [-58.6, 0.21]
      r:
        type: normal
        prior_parameters: [20.6, 0.2]
      mu_ra_cosdec:
        type: normal
        prior_parameters: [-2.736, 0.064]
      mu_dec:
        type: normal
        prior_parameters: [-2.646, 0.064]
    NGC3201:
      m_progenitor:
        type: identity
        prior_parameters: [6.47e4]
      a_progenitor:
        type: identity
        prior_parameters: [4.9]
      t_end:
        type: identity
        prior_parameters: [1.5]
      ra:
        type: identity
        prior_parameters: [154.403]
      dec:
        type: identity
        prior_parameters: [-46.412]
      vr:
        type: normal
        prior_parameters: [494.34, 0.14]
      r:
        type: normal
        prior_parameters: [4.9, 0.11]
      mu_ra_cosdec:
        type: normal
        prior_parameters: [8.324, 0.044]
      mu_dec:
        type: normal
        prior_parameters: [-1.991, 0.044]
    M68:
      m_progenitor:
        type: identity
        prior_parameters: [5.7e4]
      a_progenitor:
        type: identity
        prior_parameters: [6.4]
      t_end:
        type: identity
        prior_parameters: [1.5]
      ra:
        type: identity
        prior_parameters: [189.867]
      dec:
        type: identity
        prior_parameters: [-26.744]
      vr:
        type: normal
        prior_parameters: [-92.99, 0.22]
      r:
        type: normal
        prior_parameters: [10.3, 0.52]
      mu_ra_cosdec:
        type: normal
        prior_parameters: [-2.752, 0.054]
      mu_dec:
        type: normal
        prior_parameters: [1.762, 0.053]
