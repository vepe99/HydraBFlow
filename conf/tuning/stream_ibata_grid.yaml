# Optuna search space for the Ibata GRIDDED-summary fusion model (global level, norho) —
# model=stream_fusion_ibata_grid, adapter=stream_ibata_sumstats, augmentation=stream_global_ibata_grid.
#
# Unlike conf/tuning/stream_ibata_sumstats.yaml, sim_summary here is a rank-3 φ1 time series
# (n, K_phi1, 12) consumed DIRECTLY by a TimeSeriesTransformer (time_axis=-1), so its TYPE is fixed
# to time_series_transformer — there is no mlp/feature_transformer alternative for a gridded layout.
# All three fusion backbones (sim_summary, vcirc_kms, vterm_kms) are TimeSeriesTransformers; we tune
# each one's width/depth/heads plus the fusion head and the diffusion subnet.
#
# Concurrency-safe: launch this same command once per free GPU (identical study_name + storage_dir)
# and the processes cooperatively fill one JournalStorage `.log`. Driven by
# scripts/tune_ibata_onedisk_grid.sh (50 trials × 300 epochs across all free GPUs).
defaults:
  - base_tuning

study_name: stream_ibata_grid_study
storage_dir: ${data.data_dir}/tuning
n_trials: 50
n_epochs: 300
directions: [minimize, minimize]

search_space:
  # --- sim_summary backbone: the φ1-gridded per-stream summary TimeSeriesTransformer -------------
  #     (type stays time_series_transformer; time_axis=-1 is fixed in the base model config).
  model.summary_network.params.backbones.sim_summary.summary_dim:
    { type: int, low: 16, high: 64 }
  model.summary_network.params.backbones.sim_summary.num_blocks:
    { type: int, low: 2, high: 6 }
  model.summary_network.params.backbones.sim_summary.num_heads:
    { type: int, low: 3, high: 8 }
  model.summary_network.params.backbones.sim_summary.params.embed_dim_multiplier:
    { type: int, low: 4, high: 16 }
  # --- vcirc_kms backbone (50-radii Zhou ∪ Huang rotation curve) ---------------------------------
  model.summary_network.params.backbones.vcirc_kms.summary_dim:
    { type: int, low: 32, high: 64 }
  model.summary_network.params.backbones.vcirc_kms.num_blocks:
    { type: int, low: 2, high: 6 }
  model.summary_network.params.backbones.vcirc_kms.num_heads:
    { type: int, low: 3, high: 8 }
  model.summary_network.params.backbones.vcirc_kms.params.embed_dim_multiplier:
    { type: int, low: 4, high: 16 }
  # --- vterm_kms backbone (19-longitude HI terminal-velocity curve) ------------------------------
  model.summary_network.params.backbones.vterm_kms.summary_dim:
    { type: int, low: 16, high: 48 }
  model.summary_network.params.backbones.vterm_kms.num_blocks:
    { type: int, low: 2, high: 5 }
  model.summary_network.params.backbones.vterm_kms.num_heads:
    { type: int, low: 2, high: 6 }
  model.summary_network.params.backbones.vterm_kms.params.embed_dim_multiplier:
    { type: int, low: 4, high: 12 }
  # --- fusion head ------------------------------------------------------------------------------
  model.summary_network.params.head.width:
    { type: int, low: 32, high: 256, step: 16 }
  model.summary_network.params.head.depth:
    { type: int, low: 1, high: 4 }
  model.summary_network.params.head.output_dim:
    { type: int, low: 16, high: 64 }
  # --- inference (diffusion) subnet -------------------------------------------------------------
  model.inference_network.mlp_depth:
    { type: int, low: 2, high: 8 }
  model.inference_network.mlp_width:
    { type: int, low: 32, high: 256, step: 16 }
  model.inference_network.time_embedding_dim:
    { type: int, low: 16, high: 64, step: 2 }
