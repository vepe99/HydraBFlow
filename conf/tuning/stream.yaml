# Optuna search space for the stream fusion model (global level), mirroring the reference
# nocompositional/rotationcurve/agama study: both summary backbones, the fusion head, and the
# diffusion subnet. Dotted paths address any config field, including nested fusion params.
defaults:
  - base_tuning

study_name: stream_fusion_study
n_trials: 50
n_epochs: 10

search_space:
  model.summary_network.params.backbones.sim_data_projected.summary_dim:
    { type: int, low: 32, high: 64 }
  model.summary_network.params.backbones.sim_data_projected.num_blocks:
    { type: int, low: 2, high: 6 }
  model.summary_network.params.backbones.sim_data_projected.num_heads:
    { type: int, low: 3, high: 8 }
  # attention width = num_heads * multiplier (keeps embed_dim divisible by num_heads)
  model.summary_network.params.backbones.sim_data_projected.params.embed_dim_multiplier:
    { type: int, low: 4, high: 16 }
  model.summary_network.params.backbones.vcirc_kms.summary_dim:
    { type: int, low: 32, high: 64 }
  model.summary_network.params.backbones.vcirc_kms.num_blocks:
    { type: int, low: 2, high: 6 }
  model.summary_network.params.backbones.vcirc_kms.num_heads:
    { type: int, low: 3, high: 8 }
  model.summary_network.params.backbones.vcirc_kms.params.embed_dim_multiplier:
    { type: int, low: 4, high: 16 }
  model.summary_network.params.head.width:
    { type: int, low: 32, high: 256, step: 16 }
  model.summary_network.params.head.depth:
    { type: int, low: 1, high: 4 }
  model.summary_network.params.head.output_dim:
    { type: int, low: 16, high: 64 }
  model.inference_network.mlp_depth:
    { type: int, low: 2, high: 8 }
  model.inference_network.mlp_width:
    { type: int, low: 32, high: 256, step: 16 }
  model.inference_network.time_embedding_dim:
    { type: int, low: 16, high: 64, step: 2 }
