# Ibata fusion summary network, condition variant: same as stream_fusion_ibata but WITHOUT the
# sigma_z backbone (sigma_z is routed to inference_conditions by adapter=stream_ibata_sigma_cond,
# so the summary network never sees it). Pair with model=stream_fusion_ibata_sigma_cond.
defaults:
  - base_summary_network

type: fusion
params:
  mask_backbone: sim_data_projected
  backbones:
    sim_data_projected:
      type: set_transformer
      summary_dim: 36
      num_blocks: 4
      num_heads: 3
      dropout: 0.1
      params:
        embed_dim_multiplier: 14
    vcirc_kms:
      type: time_series_transformer
      summary_dim: 62
      num_blocks: 5
      num_heads: 6
      dropout: 0.1
      params:
        embed_dim_multiplier: 11
    vterm_kms:
      type: time_series_transformer
      summary_dim: 32
      num_blocks: 3
      num_heads: 4
      dropout: 0.1
      params:
        embed_dim_multiplier: 8
    rho_z:
      type: time_series_transformer
      summary_dim: 24
      num_blocks: 3
      num_heads: 4
      dropout: 0.1
      params:
        embed_dim_multiplier: 8
  head:
    width: 64
    depth: 4
    output_dim: 72
