# Fusion architecture for "model_5" of the reference Optuna study
# (data/hyperparameter_tuning/agama/rotationcurve/optuna_diffusionmodel_agama_rotationcurve.log,
# trial_id 5, state COMPLETE, values [rmse=0.3631, calibration_error=0.00632]). Dropout is fixed
# at 0.1 in the reference study (not part of its search space); everything else below is read
# straight from the trial's params. The reference SetTransformer's `num_seeds` (PMA seed count)
# has no equivalent in bf's current SetTransformer builder and is dropped.
defaults:
  - base_summary_network

type: fusion
params:
  mask_backbone: sim_data_projected
  backbones:
    sim_data_projected:
      type: set_transformer
      summary_dim: 36
      num_blocks: 4
      num_heads: 3
      dropout: 0.1
      params:
        embed_dim_multiplier: 14
    vcirc_kms:
      type: time_series_transformer
      summary_dim: 62
      num_blocks: 5
      num_heads: 6
      dropout: 0.1
      params:
        embed_dim_multiplier: 11
  head:
    width: 48
    depth: 4
    output_dim: 59
